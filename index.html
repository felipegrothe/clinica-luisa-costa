<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clínica Luisa Costa</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@keyframes spin{to{transform:rotate(360deg)}}
:root{
  --terra:#C17B3E;--terra-d:#8B5520;--terra-l:#F0DEC8;--terra-xl:#FAF5EE;
  --verde:#4A7C6B;--verde-l:#E8F2EE;
  --dk:#1A1714;--dk2:#221F1B;--dk3:#2E2A26;
  --bg:#F8F5F0;--bg2:#FFFFFF;--bg3:#F0EBE3;
  --bd:#EAE4DC;--bd2:#DDD6CC;
  --tx:#2C2420;--tm:#6B5A4E;--tl:#9E8E82;--txw:#E8aD5BC;
  --r:6px;--sb:58px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);font-size:13px}
button{cursor:pointer;font-family:inherit}

/* LOGIN */
#login-wrap{position:fixed;inset:0;background:var(--dk);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.login-box{background:var(--bg);border-radius:12px;padding:44px 40px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.4)}
.login-logo{width:48px;height:48px;border-radius:50%;background:var(--terra);display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:16px;color:white;margin:0 auto 20px}
.login-brand{font-size:9px;letter-spacing:3.5px;color:var(--terra);font-weight:600;text-transform:uppercase;text-align:center;margin-bottom:4px}
.login-name{font-family:Georgia,serif;font-size:22px;color:var(--tx);text-align:center;letter-spacing:1px;margin-bottom:28px}
.lf{margin-bottom:14px}
.lf label{display:block;font-size:9px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--tl);margin-bottom:5px}
.lf input{width:100%;padding:10px 13px;border:1.5px solid var(--bd2);border-radius:var(--r);background:white;outline:none;transition:border-color .15s;font-size:13px}
.lf input:focus{border-color:var(--terra);box-shadow:0 0 0 3px rgba(193,123,62,.1)}
.btn-login{width:100%;padding:12px;margin-top:8px;background:var(--terra);color:white;border:none;border-radius:var(--r);font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;transition:background .15s}
.btn-login:hover{background:var(--terra-d)}
.login-err{font-size:11px;color:#a33;text-align:center;margin-top:10px;min-height:18px;font-weight:500}

/* APP */
#app{display:none;height:100vh;overflow:hidden;flex-direction:row}
#app.on{display:flex}

/* SIDEBAR */
.sb{width:var(--sb);background:var(--dk);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:2px;flex-shrink:0;position:relative}
.sb::after{content:'';position:absolute;left:0;top:0;width:3px;height:100%;background:var(--terra)}
.sb-logo{width:36px;height:36px;border-radius:50%;background:var(--terra);display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:12px;color:white;margin-bottom:12px;flex-shrink:0}
.sb-btn{width:40px;height:42px;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;position:relative;transition:background .12s}
.sb-btn:hover{background:var(--dk3)}
.sb-btn.on{background:var(--terra)}
.sb-btn svg{width:17px;height:17px;flex-shrink:0;transition:stroke .12s}
.sb-btn span{font-size:5.5px;letter-spacing:.6px;color:var(--tl);font-weight:600;text-transform:uppercase}
.sb-btn.on span{color:rgba(255,255,255,.75)}
.sb-tt{position:absolute;left:50px;top:50%;transform:translateY(-50%);background:var(--dk2);color:var(--txw);font-size:10px;padding:5px 10px;border-radius:5px;white-space:nowrap;pointer-events:none;opacity:0;z-index:200;transition:opacity .12s;border:1px solid var(--dk3)}
.sb-btn:hover .sb-tt{opacity:1}
.sb-div{width:28px;height:1px;background:var(--dk3);margin:4px 0}
.sb-bottom{margin-top:auto}
.sb-user{width:32px;height:32px;border-radius:50%;background:rgba(193,123,62,.25);border:1px solid rgba(193,123,62,.4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--terra-l);cursor:pointer;margin-bottom:6px;position:relative}
.sb-user:hover .sb-tt{opacity:1}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--bd);height:60px;flex-shrink:0;display:flex;align-items:center;position:relative}
.topbar::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--terra)}
.tb-left{padding:0 20px}
.tb-clinic{font-size:8px;letter-spacing:3px;color:var(--terra);font-weight:600;text-transform:uppercase}
.tb-page{font-family:Georgia,serif;font-size:14px;color:var(--tx);margin-top:1px}
.tb-center{position:absolute;left:50%;transform:translateX(-50%);text-align:center}
.tb-brand{font-size:8px;letter-spacing:3px;color:var(--terra);font-weight:600;text-transform:uppercase}
.tb-name{font-family:Georgia,serif;font-size:20px;color:var(--tx);letter-spacing:1px;margin-top:1px}
.tb-right{margin-left:auto;padding:0 16px;display:flex;align-items:center;gap:10px}
.tb-user{font-size:10px;color:var(--tl);font-weight:500}
.btn-sair{padding:5px 12px;border-radius:var(--r);border:1px solid var(--bd2);background:var(--bg);color:var(--tm);font-size:10px;letter-spacing:.3px}
.btn-sair:hover{background:var(--bg3);color:var(--tx)}

/* CONTENT */
.content-wrap{flex:1;overflow:hidden;position:relative}
.module-frame{display:none;width:100%;height:100%;border:none}
.module-frame.on{display:block}
.module-loading{display:none;height:100%;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--tl)}
.module-loading.on{display:flex}
.spinner{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--terra);border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-wrap">
  <div class="login-box">
    <div class="login-logo">LC</div>
    <div class="login-brand">Clínica</div>
    <div class="login-name">Luisa Costa</div>
    <div class="lf">
      <label>E-mail</label>
      <input id="login-email" type="email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="lf">
      <label>Senha</label>
      <input id="login-senha" type="password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')fazerLogin()">
    </div>
    <button class="btn-login" onclick="fazerLogin()"><span id="btn-login-txt">Entrar</span></button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <nav class="sb">
    <div class="sb-logo">LC</div>

    <!-- PRECIFICADOR -->
    <button class="sb-btn" onclick="carregarModulo('precificador',this)" id="sb-precificador">
      <svg viewBox="0 0 18 18" fill="none" stroke="#7A6E65" stroke-width="1.5"><rect x="2" y="2" width="14" height="14" rx="2.5"/><line x1="5" y1="7" x2="13" y2="7"/><line x1="5" y1="10" x2="11" y2="10"/><line x1="5" y1="13" x2="9" y2="13"/></svg>
      <span>PREÇOS</span>
      <div class="sb-tt">Precificador</div>
    </button>

    <div class="sb-div"></div>

    <!-- ESTOQUE -->
    <button class="sb-btn" onclick="carregarModulo('estoque',this)" id="sb-estoque">
      <svg viewBox="0 0 18 18" fill="none" stroke="#7A6E65" stroke-width="1.5"><rect x="2" y="8" width="14" height="8" rx="1.5"/><path d="M5 8V6a4 4 0 0 1 8 0v2"/><line x1="9" y1="11" x2="9" y2="13"/></svg>
      <span>ESTOQUE</span>
      <div class="sb-tt">Gestão de Estoque</div>
    </button>

    <!-- FINANCEIRO -->
    <button class="sb-btn" onclick="carregarModulo('financeiro',this)" id="sb-financeiro">
      <svg viewBox="0 0 18 18" fill="none" stroke="#7A6E65" stroke-width="1.5"><rect x="2" y="5" width="14" height="10" rx="1.5"/><line x1="2" y1="8" x2="16" y2="8"/><circle cx="6" cy="12" r="1" fill="#7A6E65"/><line x1="9" y1="11" x2="13" y2="11"/><line x1="9" y1="13" x2="11" y2="13"/></svg>
      <span>FINANC.</span>
      <div class="sb-tt">Financeiro</div>
    </button>

    <!-- USUÁRIO / LOGOUT -->
    <div class="sb-bottom">
      <div class="sb-div"></div>
      <div class="sb-user" onclick="fazerLogout()" title="Sair">
        <span id="sb-user-inicial">?</span>
        <div class="sb-tt">Sair do sistema</div>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="tb-left">
        <div class="tb-clinic" id="tb-clinic">Clínica</div>
        <div class="tb-page" id="tb-page">Luisa Costa</div>
      </div>
      <div class="tb-center">
        <div class="tb-brand">Clínica</div>
        <div class="tb-name">Luisa Costa</div>
      </div>
      <div class="tb-right">
        <span class="tb-user" id="tb-user-nome"></span>
        <button class="btn-sair" onclick="fazerLogout()">Sair</button>
      </div>
    </div>

    <!-- MÓDULOS -->
    <div class="content-wrap">

      <!-- PRECIFICADOR -->
      <div class="module-loading on" id="loading-precificador">
        <div class="spinner"></div>
        <div style="font-size:12px">Carregando precificador...</div>
      </div>
      <iframe class="module-frame" id="frame-precificador"></iframe>

      <!-- ESTOQUE -->
      <div class="module-loading" id="loading-estoque">
        <div class="spinner"></div>
        <div style="font-size:12px">Carregando estoque...</div>
      </div>
      <iframe class="module-frame" id="frame-estoque"></iframe>

      <!-- FINANCEIRO -->
      <div class="module-loading" id="loading-financeiro">
        <div class="spinner"></div>
        <div style="font-size:12px">Carregando financeiro...</div>
      </div>
      <iframe class="module-frame" id="frame-financeiro"></iframe>

    </div>
  </div>
</div>

<script>
// ── SUPABASE ──────────────────────────────────────────────────────────
const SUPA_URL='https://cfyiytwgocuqjhyqcyte.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmeWl5dHdnb2N1cWpoeXFjeXRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMxMDk2MDMsImV4cCI6MjA1ODY4NTYwM30.WIDVkBkxqJoFNDGYrPAkFpnzLSAzLUXcHgplMnPbLug';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
let USER=null;

async function fazerLogin(){
  const email=document.getElementById('login-email').value.trim();
  const senha=document.getElementById('login-senha').value;
  const btn=document.getElementById('btn-login-txt');
  const err=document.getElementById('login-err');
  if(!email||!senha){err.textContent='Preencha e-mail e senha.';return;}
  btn.textContent='Entrando...';err.textContent='';
  const{data,error}=await sb.auth.signInWithPassword({email,password:senha});
  if(error){err.textContent='E-mail ou senha incorretos.';btn.textContent='Entrar';return;}
  USER=data.user;
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app').classList.add('on');
  document.getElementById('sb-user-inicial').textContent=(USER.email||'?')[0].toUpperCase();
  document.getElementById('tb-user-nome').textContent=USER.email.split('@')[0];
  // Carrega o precificador como módulo padrão
  carregarModulo('precificador',document.getElementById('sb-precificador'));
}

async function fazerLogout(){
  await sb.auth.signOut();
  location.reload();
}

// ── MÓDULOS ───────────────────────────────────────────────────────────
const modulos={};
const LABELS={precificador:'Precificador',estoque:'Estoque',financeiro:'Financeiro'};
const ARQUIVOS={precificador:'precificador.html',estoque:'estoque.html',financeiro:'financeiro.html'};

function carregarModulo(id,btn){
  // Atualiza sidebar
  document.querySelectorAll('.sb-btn').forEach(b=>{
    b.classList.remove('on');
    const svg=b.querySelector('svg');
    if(svg)svg.setAttribute('stroke','#7A6E65');
  });
  if(btn){
    btn.classList.add('on');
    const svg=btn.querySelector('svg');
    if(svg)svg.setAttribute('stroke','white');
  }

  // Atualiza topbar
  document.getElementById('tb-clinic').textContent=LABELS[id]||id;
  document.getElementById('tb-page').textContent='';

  // Esconde todos os frames e loadings
  document.querySelectorAll('.module-frame').forEach(f=>f.classList.remove('on'));
  document.querySelectorAll('.module-loading').forEach(l=>l.classList.remove('on'));

  const frame=document.getElementById('frame-'+id);
  const loading=document.getElementById('loading-'+id);

  // Se já carregado, só exibe
  if(modulos[id]){
    frame.classList.add('on');
    return;
  }

  // Primeira vez: carrega via fetch
  loading.classList.add('on');
  fetch(ARQUIVOS[id])
    .then(r=>{if(!r.ok)throw new Error('not found');return r.text();})
    .then(html=>{
      frame.srcdoc=html;
      frame.classList.add('on');
      loading.classList.remove('on');
      modulos[id]=true;
    })
    .catch(()=>{
      loading.innerHTML=`<div style="text-align:center;max-width:340px;padding:20px">
        <div style="font-size:32px;margin-bottom:14px">⚠️</div>
        <div style="font-size:14px;font-weight:600;color:var(--tx);margin-bottom:8px">${LABELS[id]} não encontrado</div>
        <div style="font-size:12px;color:var(--tl);line-height:1.6">
          Certifique-se que o arquivo <strong>${ARQUIVOS[id]}</strong><br>está no repositório do GitHub.
        </div>
      </div>`;
    });
}

// Verifica sessão ao carregar
sb.auth.getSession().then(({data:{session}})=>{
  if(session?.user){
    USER=session.user;
    document.getElementById('login-wrap').style.display='none';
    document.getElementById('app').classList.add('on');
    document.getElementById('sb-user-inicial').textContent=(USER.email||'?')[0].toUpperCase();
    document.getElementById('tb-user-nome').textContent=USER.email.split('@')[0];
    carregarModulo('precificador',document.getElementById('sb-precificador'));
  }
});
</script>
</body>
</html>
